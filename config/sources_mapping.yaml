# Маппинг каналов трафика на источники Bitrix24.
# Этот файл редактируется руками — бот подхватывает изменения при рестарте.
# Если появился новый номер / новый источник — добавь строку и `systemctl restart crm-bot`.
#
# Каждая запись:
#   bitrix_source_ids   — список SOURCE_ID в Bitrix (точное совпадение)
#   phone_pool          — телефоны, входящие звонки на которые тоже относятся к этому каналу
#                         (бот ищет эти номера в TITLE лида через подстроку)
#   utm_rules           — UTM-условия (опционально), которые подтверждают канал даже при WEB source
#   description         — пояснение для модели (что входит, как трактовать)

авито:
  bitrix_source_ids:
    - "1|AVITO"           # Avito - Открытая линия
    - "4"                  # Звонок на 79315217809 — Авито
    - "5"                  # Звонок на 79311051870 — Авито
  phone_pool:
    - "+79311051870"
    - "79311051870"
    - "+79315217809"
    - "79315217809"
  description: "Авито — открытая линия и два телефонных пула (931 105-18-70, 931 521-78-09)"

сайт-сео:
  bitrix_source_ids:
    - "WEBFORM"            # CRM-форма
    - "UC_BSFU8L"          # growzone.ru - Воплотим мечты
    - "UC_GMYMB6"          # growzone.ru - Делаем грамотно
    - "UC_M0M34U"          # growzone.ru - Забудьте о поливе
    - "UC_2IVO49"          # growzone.ru - Контакты
    - "UC_U5VROI"          # growzone.ru - Рассчитайте
    - "UC_K3ESXW"          # growzone.ru - Сделайте шаг
    - "UC_BP3X55"          # growzone.ru - Футер
    - "3"                  # Звонок на 74956624736 — сайт
    - "12"                 # Звонок на 78003331245 — основной сайт
  phone_pool:
    - "+74956624736"
    - "74956624736"
    - "+78003331245"
    - "78003331245"
  description: "Основной сайт growzone.ru — SEO трафик (без UTM). Все формы и страницы основного сайта + два телефонных пула."

яндекс-директ:
  bitrix_source_ids:
    - "WEB"                # Веб-сайт (если есть UTM yandex/cpc — это Директ)
  utm_rules:
    utm_source_in: ["yandex"]
    # ИЛИ utm_medium_in: ["cpc"]
  description: "Платная реклама Яндекс.Директ. SOURCE_ID=WEB + UTM_SOURCE=yandex (или UTM_MEDIUM=cpc). Если SOURCE_ID=WEB БЕЗ UTM — это редкость, считай как Веб-сайт без атрибуции."

вконтакте:
  bitrix_source_ids:
    - "6"

профи-ру:
  bitrix_source_ids:
    - "7"

яндекс-услуги:
  bitrix_source_ids:
    - "UC_HKYH6T"

мессенджеры:
  bitrix_source_ids:
    - "5|ANK_CHATS_APP24_WHATSAPP"      # WhatsApp
    - "1|ANK_CHATS_APP24_WHATSAPP"      # WhatsApp WABA
    - "11|ANK_CHATS_APP24_WHATS_APP"    # WhatsApp waba
    - "10"                                # ChatApp Telegram
    - "9|ANK_CHATS_APP24_TELEGRAM"      # Telegram personal
    - "13|ANK_CHATS_APP24_MAX"          # Max
    - "15|ANK_CHATS_APP24_MAX"          # Резервная Макс
    - "19|ANK_CHATS_APP24_MAX"          # Макс 3
  description: "Все мессенджеры (WhatsApp, Telegram, Max). Можешь группировать по каналу если спросят явно."

партнерские:
  bitrix_source_ids:
    - "PARTNER"
    - "2"
    - "RECOMMENDATION"
    - "REPEAT_SALE"
  description: "Партнёрский / повторные / по рекомендации — не платный трафик"

прочее:
